<head>
  <meta charset="utf-8">

  <meta property="og:title" content="精益知识分享｜QilyLean制造改善知识库">

  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3faf9}
    #knowledgeFrame{display:block;width:100%;height:100%;border:0;background:#f3faf9}
  </style>
</head>
<body>
  <iframe id="knowledgeFrame" src="/qilylean/home.html?build=20260722-knowledge-share-v2#knowledge" title="QilyLean精益知识分享"></iframe>
  <script>
  (function(){
    'use strict';
    var frame=document.getElementById('knowledgeFrame');
    function lockKnowledge(){
      try{
        var view=frame.contentWindow;
        var doc=frame.contentDocument;
        if(!view||!doc)return;
        if(view.location.hash!=='#knowledge')view.location.hash='knowledge';
        var section=doc.getElementById('knowledge');
        if(section)section.scrollIntoView({block:'start'});
        var card=doc.getElementById('dailyInsightsKnowledgeCard');
        if(card){
          var small=card.querySelector('small');
          var title=card.querySelector('h3');
          var intro=card.querySelector('p');
          var button=card.querySelector('.knowledge-actions .button');
          if(small)small.textContent='每日工程简报｜最新：2026-07-22';
          if(title)title.textContent='每日工程版简报';
          if(intro)intro.textContent='最新简报：5W2H不是要因分析，而是把问题和行动说清楚。目录完整关联2025-12-19以来全部简报，并按最新至最早自动排列。';
          if(button){button.textContent='查看全部简报';button.href='/qilylean/daily-insights.html?view=all#all-briefs';button.target='_top';}
        }
      }catch(error){}
    }
    frame.addEventListener('load',function(){lockKnowledge();setTimeout(lockKnowledge,350);setTimeout(lockKnowledge,1200);});
    window.addEventListener('resize',lockKnowledge);
  })();
  </script>
  <script src="/homepage-music.js?v=20260721-gapless-v3"></script>
</body>
</html>

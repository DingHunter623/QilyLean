<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
<title id="title">质量防错配图</title><desc id="desc">通过结构与流程设计，让错误难以发生</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b3f4b"/><stop offset="1" stop-color="#177f87"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#062a32" flood-opacity=".28"/></filter></defs>
<rect width="800" height="800" rx="40" fill="url(#bg)"/>
<circle cx="400" cy="270" r="150" fill="#f4fbf9" filter="url(#shadow)"/>
<path d="M330 270l48 48 96-108" fill="none" stroke="#177f87" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M262 485h276" stroke="#ffe39b" stroke-width="10" stroke-linecap="round"/>
<text x="400" y="555" text-anchor="middle" fill="#fff" font-size="58" font-weight="800">质量防错</text>

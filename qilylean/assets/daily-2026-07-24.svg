<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
<title id="title">从单点验证到横向复制的改善扩散路径</title><desc id="desc">一个已验证的改善标准经过对象识别、风险筛查、适配验证和责任固化，复制到多个相似制造场景</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b3f4b"/><stop offset="1" stop-color="#177f87"/></linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffe39b"/><stop offset="1" stop-color="#caa15f"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#062a32" flood-opacity=".28"/></filter>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#ffe39b"/></marker>
</defs>
<rect width="800" height="800" rx="40" fill="url(#bg)"/>
<rect x="188" y="58" width="424" height="48" rx="24" fill="#ffffff" fill-opacity=".12" stroke="#ffffff" stroke-opacity=".34"/>
<text x="400" y="90" text-anchor="middle" fill="#d8efeb" font-size="21" font-weight="800" letter-spacing="2">HORIZONTAL DEPLOYMENT</text>
<text x="400" y="154" text-anchor="middle" fill="#fff" font-size="42" font-weight="900">单点改善 ≠ 体系能力</text>
<text x="400" y="195" text-anchor="middle" fill="#ffe39b" font-size="25" font-weight="700">把验证有效的方法复制到相似场景</text>
<g filter="url(#shadow)">
  <rect x="265" y="245" width="270" height="128" rx="28" fill="#f6fbfa"/>
  <rect x="74" y="468" width="190" height="128" rx="24" fill="#f6fbfa"/>
  <rect x="305" y="468" width="190" height="128" rx="24" fill="#f6fbfa"/>
  <rect x="536" y="468" width="190" height="128" rx="24" fill="#f6fbfa"/>
</g>
<circle cx="400" cy="309" r="48" fill="url(#gold)"/>
<path d="M379 309l15 15 31-37" fill="none" stroke="#17322d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
<text x="400" y="348" text-anchor="middle" fill="#0f4b5a" font-size="25" font-weight="900">已验证标准</text>
<path d="M400 373v50" stroke="#ffe39b" stroke-width="8" stroke-linecap="round"/>
<path d="M400 423H169v45" fill="none" stroke="#ffe39b" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M400 423v45" fill="none" stroke="#ffe39b" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M400 423h231v45" fill="none" stroke="#ffe39b" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
<g fill="#caa15f" font-size="19" font-weight="900">
  <text x="98" y="500">01</text><text x="329" y="500">02</text><text x="560" y="500">03</text>
</g>
<g fill="#0f4b5a" text-anchor="middle" font-weight="900">
  <text x="169" y="536" font-size="28">对象识别</text><text x="169" y="570" font-size="17">产品 · 设备 · 工序</text>
  <text x="400" y="536" font-size="28">适配验证</text><text x="400" y="570" font-size="17">边界 · 风险 · 条件</text>
  <text x="631" y="536" font-size="28">责任固化</text><text x="631" y="570" font-size="17">标准 · 点检 · 系统</text>
</g>
<rect x="120" y="642" width="560" height="62" rx="31" fill="#062f38" fill-opacity=".62"/>
<text x="400" y="680" text-anchor="middle" fill="#fff" font-size="24" font-weight="800">识别对象 → 风险筛查 → 标准适配 → 现场验证 → 责任固化</text>
<text x="400" y="744" text-anchor="middle" fill="#d8efeb" font-size="22" font-weight="800">让一次改善，成为组织可复制的知识</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
<title id="title">制造改善执行闭环</title><desc id="desc">目标、计划、标准、执行、检查、改善与知识沉淀形成持续循环</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#0f4b5a"/><stop offset="1" stop-color="#178b94"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#082f39" flood-opacity=".22"/></filter></defs>
<rect width="1000" height="1000" rx="42" fill="url(#bg)"/>
<text x="64" y="76" fill="#ffe39b" font-size="32" font-weight="800">2026-07-14｜DAY007</text>
<text x="64" y="152" fill="#fff" font-size="58" font-weight="900">改善不是“做完”</text>
<text x="64" y="218" fill="#fff" font-size="58" font-weight="900">而是形成执行闭环</text>
<text x="64" y="278" fill="#d8efeb" font-size="25">目标 → 计划 → 标准 → 执行 → 检查 → 改善 → 沉淀</text>
<g transform="translate(500 625)" filter="url(#sh)">
<circle r="214" fill="none" stroke="#ffe39b" stroke-width="17" stroke-dasharray="116 24"/>
<circle r="126" fill="#fff"/>
<text x="0" y="-10" text-anchor="middle" fill="#0f4b5a" font-size="42" font-weight="900">执行闭环</text>
<text x="0" y="38" text-anchor="middle" fill="#178b94" font-size="25" font-weight="800">让改善可复制</text>
</g>
<g fill="#fff" font-size="27" font-weight="900" text-anchor="middle">
<g transform="translate(500 372)"><circle r="54" fill="#caa15f"/><text y="9">目标</text></g>
<g transform="translate(690 445)"><circle r="54" fill="#6e3f5f"/><text y="9">计划</text></g>
<g transform="translate(752 625)"><circle r="54" fill="#177f87" stroke="#fff" stroke-width="4"/><text y="9">标准</text></g>
<g transform="translate(668 802)"><circle r="54" fill="#caa15f"/><text y="9">执行</text></g>
<g transform="translate(332 802)"><circle r="54" fill="#6e3f5f"/><text y="9">检查</text></g>
<g transform="translate(248 625)"><circle r="54" fill="#177f87" stroke="#fff" stroke-width="4"/><text y="9">改善</text></g>
<g transform="translate(310 445)"><circle r="58" fill="#caa15f"/><text y="-2">知识</text><text y="29">沉淀</text></g>
</g>
<line x1="320" y1="930" x2="680" y2="930" stroke="#ffe39b" stroke-width="5" stroke-linecap="round"/>
<text x="500" y="968" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">每日工程版简报</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350" role="img" aria-labelledby="title desc">
  <title id="title">分享“启力精益”官网</title>
  <desc id="desc">QilyLean启力精益官网分享卡片，包含三色品牌标志、官网二维码和网址，不含关闭按钮。</desc>
  <rect width="1080" height="1350" fill="#ffffff"/>

  <defs>
    <mask id="share-logo-i-dot-mask">
      <rect width="1090" height="196" fill="#ffffff"/>
      <rect x="128" y="15" width="34" height="51" fill="#000000"/>
    </mask>
  </defs>

  <g transform="translate(169 62) scale(.68)">
    <g fill="#0b4e60">
      <text x="6" y="150" textLength="660" lengthAdjust="spacingAndGlyphs" font-family="Arial Rounded MT Bold,Avenir Next,Segoe UI,sans-serif" font-size="150" font-weight="800" mask="url(#share-logo-i-dot-mask)">QilyLean</text>
      <text x="712" y="145" textLength="360" lengthAdjust="spacingAndGlyphs" font-family="PingFang SC,Microsoft YaHei,Noto Sans SC,Noto Sans CJK SC,Segoe UI,sans-serif" font-size="108" font-weight="800">启力精益</text>
    </g>
    <circle cx="146.625" cy="40.5" r="22" fill="#d33f36"/>
    <rect x="686" y="24" width="5" height="138" rx="2.5" fill="#caa15f"/>
    <path d="M22 146c18 8 38 10 58 5" fill="none" stroke="#0b4e60" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="540" y="292" text-anchor="middle" fill="#0b4e60" font-family="Noto Sans SC,Microsoft YaHei,PingFang SC,sans-serif" font-size="54" font-weight="800">分享“启力精益”官网</text>

  <rect x="270" y="365" width="540" height="540" rx="12" fill="#ffffff"/>
  <image x="285" y="380" width="510" height="510" href="data:image/png;base64,"/>

  <rect x="85" y="970" width="910" height="108" rx="24" fill="#f7fbfb" stroke="#cfe1e1" stroke-width="3"/>
  <text x="540" y="1039" text-anchor="middle" fill="#315d64" font-family="Arial,Noto Sans SC,Microsoft YaHei,sans-serif" font-size="38" font-weight="500">https://qilylean.com/</text>

  <text x="540" y="1171" text-anchor="middle" fill="#61787b" font-family="Noto Sans SC,Microsoft YaHei,PingFang SC,sans-serif" font-size="35" font-weight="500">扫码或复制官网地址访问 “QilyLean 启力精益”</text>
  <line x1="425" y1="1246" x2="655" y2="1246" stroke="#caa15f" stroke-width="4" stroke-linecap="round"/>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>分享“启力精益”官网｜QilyLean</title>
  <meta name="description" content="QilyLean启力精益官网独立分享页：扫码或复制官网地址访问。">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://qilylean.com/share/">
  <style>
    :root{color-scheme:light;--deep:#0b4e60;--muted:#61787b;--line:#cfe1e1;--soft:#f4f8f8}
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#edf5f4 0%,#f8fbfb 48%,#edf3f2 100%);font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",Arial,sans-serif;color:var(--deep)}
    .share-page{width:min(720px,100%)}
    .share-card{margin:0;overflow:hidden;border:1px solid rgba(11,78,96,.12);border-radius:26px;background:#fff;box-shadow:0 24px 64px rgba(11,78,96,.14)}
    .share-card img{display:block;width:100%;height:auto}
    .actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:20px 16px 0}
    .actions button,.actions a{min-width:142px;padding:13px 20px;border:0;border-radius:14px;background:var(--deep);color:#fff;text-align:center;text-decoration:none;font:inherit;font-weight:800;cursor:pointer}
    .actions .secondary{background:#fff;color:var(--deep);box-shadow:inset 0 0 0 1px var(--line)}
    .status{min-height:28px;margin:12px 0 0;text-align:center;color:var(--muted);font-size:15px;font-weight:650}
    @media(max-width:560px){body{padding:10px}.share-card{border-radius:18px}.actions{gap:10px}.actions button,.actions a{min-width:0;flex:1;padding:12px 10px;font-size:15px}}
  </style>
</head>
<body>
  <main class="share-page">
    <figure class="share-card">
      <img src="/share/qilylean-share-card.svg?v=20260724-share-card-v1" alt="QilyLean启力精益官网分享卡片">
    </figure>
    <div class="actions" aria-label="分享操作">
      <button id="systemShare" type="button">系统分享</button>
      <button id="copyUrl" type="button">复制网址</button>
      <a class="secondary" href="/share/qilylean-share-card.svg?v=20260724-share-card-v1" download="QilyLean启力精益官网分享卡.svg">下载原图</a>
    </div>
    <p class="status" id="status" aria-live="polite"></p>
  </main>
  <script>
    (function(){
      'use strict';
      var HOME_URL='https://qilylean.com/';
      var TITLE='分享“启力精益”官网';
      var status=document.getElementById('status');
      function setStatus(message){status.textContent=message;}
      function copyText(text){
        if(navigator.clipboard&&window.isSecureContext)return navigator.clipboard.writeText(text);
        var field=document.createElement('textarea');
        field.value=text;field.style.position='fixed';field.style.left='-9999px';
        document.body.appendChild(field);field.select();document.execCommand('copy');field.remove();
        return Promise.resolve();
      }
      document.getElementById('copyUrl').addEventListener('click',function(){
        copyText(HOME_URL).then(function(){setStatus('官网网址已复制：'+HOME_URL);});
      });
      document.getElementById('systemShare').addEventListener('click',function(){
        if(navigator.share){
          navigator.share({title:TITLE,text:'“启精益之智，聚企业之力。”让改善形成体系，让精益产生力量。',url:HOME_URL})
            .then(function(){setStatus('已调起系统分享');})
            .catch(function(error){if(error&&error.name!=='AbortError')copyText(HOME_URL).then(function(){setStatus('官网网址已复制：'+HOME_URL);});});
          return;
        }
        copyText(TITLE+'\n'+HOME_URL).then(function(){setStatus('分享标题与官网网址已复制');});
      });
    })();
  </script>
</body>
</html>

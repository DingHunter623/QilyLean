name: Audit public modules and sitemap

on:
  push:
    branches: [main]
    paths:
      - "scripts/sync-public-modules.js"
      - "site-navigation.js"
      - "projects/**"
      - "knowledge/**"
      - "improvements/**"
      - "moments/**"
      - "capabilities/**"
      - "experience/**"
      - "cooperation/**"
      - "qilylean/gbt2828.html"
      - "qilylean/daily-insights.html"
      - "qilylean/daily/2026-07-24.html"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-module-audit-main
  cancel-in-progress: true

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync sitemap and audit public modules
        run: node scripts/sync-public-modules.js

      - name: Commit sitemap updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Sitemap and public modules are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "build: index independent project pages [skip ci]"
          git push

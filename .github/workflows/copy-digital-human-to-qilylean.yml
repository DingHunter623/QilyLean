name: Copy digital_human to qilylean

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy directory and switch references
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "digital_human" ]; then
            echo "digital_human directory does not exist."
            exit 1
          fi

          rm -rf qilylean
          cp -a digital_human qilylean

          python3 - <<'PY'
          from pathlib import Path

          root = Path(".")
          changed = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue

              # 不处理 Git 内部文件
              if ".git" in path.parts:
                  continue

              # 不修改任何 GitHub Actions 工作流，避免权限拦截
              if ".github" in path.parts:
                  continue

              # 保留旧目录作为备用入口，不改旧目录内部内容
              if "digital_human" in path.parts:
                  continue

              try:
                  original = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue

              updated = original.replace(
                  "/digital_human/",
                  "/qilylean/"
              ).replace(
                  "digital_human/",
                  "qilylean/"
              )

              if updated != original:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(str(path))

          print(f"Updated {len(changed)} text files:")
          for item in changed:
              print(item)
          PY

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 只提交新目录
          git add qilylean

          # 提交根目录普通站点文件，但绝不提交 .github/workflows
          find . -maxdepth 1 -type f \
            \( -name "*.html" \
            -o -name "*.js" \
            -o -name "*.json" \
            -o -name "*.xml" \
            -o -name "*.md" \
            -o -name "*.toml" \
            -o -name "CNAME" \
            -o -name "robots.txt" \
            \) \
            -print0 | xargs -0 -r git add --

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Copy digital_human to qilylean and switch active references"
          git push origin HEAD:main

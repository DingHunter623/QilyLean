name: Refresh latest daily brief

on:
  push:
    paths:
      - '.github/workflows/refresh-latest-brief.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Refresh latest brief loader
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('qilylean/daily-insights.html')
          text=path.read_text(encoding='utf-8')
          text=text.replace('daily-insights-archive.js?v=20260722-all-v2','daily-insights-archive.js?v=20260722-latest-v3')
          text=text.replace('<a href="#2026-07-21">最新简报</a>','<a href="#2026-07-22">最新简报</a>')
          text=text.replace('<a href="#2026-07-19">最新简报</a>','<a href="#2026-07-22">最新简报</a>')
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit refresh
        run: |
          git config user.name 'QilyLean Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add qilylean/daily-insights.html
          git commit -m '同步每日工程版简报最新入口与首条内容'
          git push
